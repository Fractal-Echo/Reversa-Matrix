site_name: Reversa-Matrix
site_url: https://fractal-echo.github.io/Reversa-Matrix
site_description: AI evidence, contradiction, and guarded patch-intelligence engine for codebases, devices, runtimes, games, and agent workflows.
site_author: Fractal-Echo
repo_url: https://github.com/Fractal-Echo/Reversa-Matrix
repo_name: Fractal-Echo/Reversa-Matrix
edit_uri: edit/main/docs/
copyright: "Reversa-Matrix"

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.tooltips
  icon:
    repo: fontawesome/brands/github
    logo: material/magnify

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - en

nav:
  - Home: index.md
  - Reversa Identity: REVERSA_IDENTITY.md

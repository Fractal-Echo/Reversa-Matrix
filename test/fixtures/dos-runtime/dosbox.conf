[sdl]
fullscreen=false
fullresolution=desktop
windowresolution=1920x1080
output=opengl

[render]
aspect=true
scaler=normal3x
glshader=crt-lottes

[cpu]
core=dynamic
cputype=pentium_slow
cycles=max 60000

[dosbox]
memsize=32
machine=svga_s3

[midi]
mididevice=fluidsynth
mpu401=intelligent
mt32.romdir=.\mt32

[sblaster]
sbtype=sb16
oplmode=auto

[joystick]
joysticktype=fcs
mapperfile=mapper-d.conf
timed=false

[autoexec]
mount c ".\D"
imgmount d ".\D - Disc 1.cue" -t iso
c:
D.EXE

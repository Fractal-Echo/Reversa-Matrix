services:
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "${REVERSA_VLLM_PORT:-8000}:8000"
    volumes:
      - "${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface"
    environment:
      HF_HOME: /root/.cache/huggingface
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--model"
      - "${REVERSA_VLLM_MODEL:-Qwen/Qwen3-Coder-30B-A3B-Instruct}"
      - "--served-model-name"
      - "${REVERSA_SERVED_MODEL:-reversa-coder}"
      - "--max-model-len"
      - "${REVERSA_VLLM_MAX_MODEL_LEN:-8192}"
      - "--gpu-memory-utilization"
      - "${REVERSA_VLLM_GPU_MEMORY_UTILIZATION:-0.85}"
      - "--enforce-eager"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]

<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 420">
  <title id="title">Reversa-Matrix monogram</title>
  <desc id="desc">Original Reversa-Matrix RM monogram with clean neon console wordmark.</desc>
  <defs>
    <linearGradient id="rim" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#65ff4d"/>
      <stop offset="0.48" stop-color="#18e5ff"/>
      <stop offset="1" stop-color="#ff304f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111a"/>
      <stop offset="1" stop-color="#0d1722"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#183449" stroke-width="1" opacity="0.42"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="28" fill="#030609"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)" opacity="0.85"/>
  <path d="M64 88h260l42-44h468l42 44h260v244h-260l-42 44H366l-42-44H64z" fill="url(#panel)" stroke="#254a60" stroke-width="2.5"/>
  <path d="M112 112h238m501 0h238" fill="none" stroke="#18e5ff" stroke-width="4" opacity="0.9" filter="url(#softGlow)"/>
  <path d="M112 307h213l31 33h488l31-33h213" fill="none" stroke="url(#rim)" stroke-width="4" filter="url(#softGlow)"/>

  <g transform="translate(104 126)">
    <path d="M72 0h164l72 42v168l-72 42H72L0 210V42z" fill="#03100d" stroke="#65ff4d" stroke-width="6" filter="url(#softGlow)"/>
    <path d="M34 210h202l72-42" fill="none" stroke="#18e5ff" stroke-width="4" opacity="0.72"/>
    <text x="52" y="162" fill="#65ff4d" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="112" font-weight="950" letter-spacing="-8">R</text>
    <text x="154" y="162" fill="#18e5ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="112" font-weight="950" letter-spacing="-8">M</text>
  </g>

  <g transform="translate(446 132)">
    <text x="0" y="0" fill="#edf7ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="58" font-weight="950" letter-spacing="1.5">REVERSA-MATRIX</text>
    <text x="2" y="48" fill="#18e5ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="900" letter-spacing="5">EVIDENCE FIRST / PATCHES GUARDED</text>
    <rect x="2" y="84" width="164" height="42" rx="4" fill="#06140d" stroke="#65ff4d"/>
    <rect x="186" y="84" width="246" height="42" rx="4" fill="#06131a" stroke="#18e5ff"/>
    <rect x="452" y="84" width="224" height="42" rx="4" fill="#16070b" stroke="#ff304f"/>
    <g font-family="ui-monospace,Consolas,monospace" font-size="18" font-weight="800">
      <text x="20" y="111" fill="#65ff4d">scan=true</text>
      <text x="204" y="111" fill="#18e5ff">frontier=preserved</text>
      <text x="470" y="111" fill="#ff304f">mutation=blocked</text>
    </g>
    <text x="2" y="176" fill="#93a5b8" font-family="ui-monospace,Consolas,monospace" font-size="22" font-weight="700">json/jsonl are source of truth</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 420">
  <title id="title">Reversa-Matrix monogram</title>
  <desc id="desc">Original neon Reversa-Matrix RM monogram with evidence-console styling.</desc>
  <defs>
    <linearGradient id="scan" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#65ff4d"/>
      <stop offset="0.5" stop-color="#18e5ff"/>
      <stop offset="1" stop-color="#ff304f"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#173143" stroke-width="1" opacity="0.55"/>
    </pattern>
  </defs>
  <rect width="1200" height="420" rx="28" fill="#030609"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)" opacity="0.72"/>
  <path d="M50 68h215l32-32h606l32 32h215v284h-224l-32 32H306l-32-32H50z" fill="#07111a" stroke="#254a60" stroke-width="2"/>
  <path d="M94 338h194l28 28h568l28-28h194" fill="none" stroke="url(#scan)" stroke-width="4" filter="url(#glow)"/>
  <path d="M96 82h196m616 0h196" fill="none" stroke="#18e5ff" stroke-width="3" opacity="0.85"/>
  <g transform="translate(111 112)">
    <path d="M65 0h200l65 38v150l-65 38H65L0 188V38z" fill="#04110e" stroke="#65ff4d" stroke-width="5" filter="url(#glow)"/>
    <path d="M53 50h118c38 0 61 19 61 51 0 23-12 39-34 47l42 42h-58l-38-38H104v38H53zm51 42v24h65c9 0 16-4 16-12s-7-12-16-12z" fill="#65ff4d"/>
    <path d="M250 190V50h54l47 70 47-70h54v140h-49v-70l-40 58h-24l-40-58v70z" fill="#18e5ff"/>
  </g>
  <g transform="translate(507 122)">
    <text x="0" y="0" fill="#edf7ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="68" font-weight="900" letter-spacing="0">REVERSA-MATRIX</text>
    <text x="2" y="48" fill="#18e5ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800" letter-spacing="4">EVIDENCE FIRST / PATCHES GUARDED</text>
    <g transform="translate(0 86)" font-family="ui-monospace,Consolas,monospace" font-size="24" font-weight="700">
      <text x="0" y="0" fill="#65ff4d">scan=true</text>
      <text x="188" y="0" fill="#18e5ff">frontier=preserved</text>
      <text x="498" y="0" fill="#ff304f">mutation=blocked</text>
      <text x="0" y="44" fill="#93a5b8">json/jsonl are source of truth</text>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1000 620">
  <title id="title">Reversa scan dashboard example</title>
  <desc id="desc">Example dashboard shot showing findings, contradictions, patch candidates, and evidence output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#030609"/>
      <stop offset="1" stop-color="#0b1722"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#183449" stroke-width="1" opacity="0.45"/>
    </pattern>
  </defs>
  <rect width="1000" height="620" rx="22" fill="url(#bg)"/>
  <rect width="1000" height="620" rx="22" fill="url(#grid)"/>
  <rect x="34" y="32" width="932" height="556" rx="14" fill="#07111a" stroke="#254a60" stroke-width="2"/>
  <text x="64" y="82" fill="#edf7ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="36" font-weight="900">Scan Report</text>
  <text x="66" y="116" fill="#18e5ff" font-family="ui-monospace,Consolas,monospace" font-size="18">profile=power_tdp_runtime output=reversa_out</text>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="800">
    <rect x="64" y="154" width="200" height="110" rx="8" fill="#0c1724" stroke="#65ff4d"/>
    <text x="84" y="190" fill="#93a5b8" font-size="16">Findings</text>
    <text x="84" y="238" fill="#65ff4d" font-size="46">731</text>
    <rect x="286" y="154" width="200" height="110" rx="8" fill="#0c1724" stroke="#18e5ff"/>
    <text x="306" y="190" fill="#93a5b8" font-size="16">Contradictions</text>
    <text x="306" y="238" fill="#18e5ff" font-size="46">0</text>
    <rect x="508" y="154" width="200" height="110" rx="8" fill="#0c1724" stroke="#ffc857"/>
    <text x="528" y="190" fill="#93a5b8" font-size="16">Patch Candidates</text>
    <text x="528" y="238" fill="#ffc857" font-size="46">0</text>
    <rect x="730" y="154" width="170" height="110" rx="8" fill="#0c1724" stroke="#ff304f"/>
    <text x="750" y="190" fill="#93a5b8" font-size="16">Severity</text>
    <text x="750" y="238" fill="#ff304f" font-size="38">HIGH</text>
  </g>
  <g font-family="ui-monospace,Consolas,monospace" font-size="19">
    <rect x="64" y="304" width="405" height="214" rx="8" fill="#04090e" stroke="#1f3448"/>
    <text x="86" y="342" fill="#65ff4d">TDP_BACKEND_RYZENADJ</text>
    <text x="86" y="378" fill="#18e5ff">GAME_PROFILE_STEAM_APPID</text>
    <text x="86" y="414" fill="#ffc857">STABLE_SAMPLE_HYSTERESIS</text>
    <text x="86" y="450" fill="#edf7ff">MUTATION_REQUIRES_APPROVAL</text>
    <text x="86" y="486" fill="#93a5b8">RUNTIME_PROOF_MISSING</text>
    <rect x="512" y="304" width="388" height="214" rx="8" fill="#04090e" stroke="#1f3448"/>
    <text x="534" y="342" fill="#edf7ff">report.json</text>
    <text x="534" y="378" fill="#edf7ff">evidence.jsonl</text>
    <text x="534" y="414" fill="#edf7ff">summary.md</text>
    <text x="534" y="450" fill="#edf7ff">agent_handoff/</text>
    <text x="534" y="486" fill="#65ff4d">dashboard.html</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1000 620">
  <title id="title">Reversa scan dashboard example</title>
  <desc id="desc">Nebula-style Reversa dashboard shot showing findings, contradictions, patch candidates, and evidence output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020407"/>
      <stop offset=".58" stop-color="#061018"/>
      <stop offset="1" stop-color="#0d0508"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#123041" stroke-width="1" opacity=".55"/>
    </pattern>
  </defs>
  <rect width="1000" height="620" rx="24" fill="url(#bg)"/>
  <rect width="1000" height="620" rx="24" fill="url(#grid)"/>
  <path d="M54 52h236l32-32h356l32 32h236v516H54z" fill="#071018" stroke="#244459" stroke-width="2.5"/>
  <path d="M92 88h206m404 0h206" stroke="#00e7ff" stroke-width="4" filter="url(#glow)"/>
  <text x="92" y="124" fill="#edf7ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="950" letter-spacing="2">SCAN DASHBOARD</text>
  <text x="94" y="154" fill="#61ff33" font-family="ui-monospace,Consolas,monospace" font-size="17" font-weight="800">profile=power_tdp_runtime source=json/jsonl</text>
  <text x="804" y="124" fill="#ff304f" font-family="ui-monospace,Consolas,monospace" font-size="18" font-weight="800">GUARDED</text>

  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="900">
    <path d="M92 196h178l20 20-20 92H92z" fill="#06100c" stroke="#61ff33"/>
    <text x="116" y="232" fill="#61ff33" font-size="16" letter-spacing="2">FINDINGS</text>
    <text x="116" y="286" fill="#edf7ff" font-size="48">731</text>
    <path d="M308 196h178l20 20-20 92H308z" fill="#061019" stroke="#00e7ff"/>
    <text x="332" y="232" fill="#00e7ff" font-size="16" letter-spacing="2">CONFLICTS</text>
    <text x="332" y="286" fill="#edf7ff" font-size="48">0</text>
    <path d="M524 196h178l20 20-20 92H524z" fill="#12070b" stroke="#ff304f"/>
    <text x="548" y="232" fill="#ff304f" font-size="16" letter-spacing="2">PATCHES</text>
    <text x="548" y="286" fill="#edf7ff" font-size="48">0</text>
    <path d="M740 196h168l20 20-20 92H740z" fill="#090f13" stroke="#244459"/>
    <text x="764" y="232" fill="#96a5b6" font-size="16" letter-spacing="2">SEVERITY</text>
    <text x="764" y="286" fill="#61ff33" font-size="36">READY</text>
  </g>

  <g font-family="ui-monospace,Consolas,monospace" font-size="18" font-weight="800">
    <path d="M92 350h392v144H92z" fill="#04090e" stroke="#244459"/>
    <text x="116" y="386" fill="#61ff33">TDP_BACKEND_RYZENADJ</text>
    <text x="116" y="420" fill="#00e7ff">GAME_PROFILE_STEAM_APPID</text>
    <text x="116" y="454" fill="#ff304f">MUTATION_REQUIRES_APPROVAL</text>
    <path d="M532 350h376v144H532z" fill="#04090e" stroke="#244459"/>
    <text x="558" y="386" fill="#edf7ff">report.json</text>
    <text x="558" y="420" fill="#edf7ff">evidence.jsonl</text>
    <text x="558" y="454" fill="#61ff33">agent_handoff/</text>
  </g>

  <path d="M92 536h310l22 18h300l22-18h162" stroke="#00e7ff" stroke-width="4" fill="none" filter="url(#glow)"/>
</svg>

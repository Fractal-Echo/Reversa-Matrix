<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 360">
  <title id="title">Reversa-Matrix hero wordmark</title>
  <desc id="desc">Clean Reversa-Matrix RM monogram and wordmark with no overlapping text.</desc>
  <defs>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#65ff4d"/>
      <stop offset="0.52" stop-color="#18e5ff"/>
      <stop offset="1" stop-color="#ff304f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="1" stop-color="#0d1824"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#173143" stroke-width="1" opacity="0.42"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="26" fill="#030609"/>
  <rect width="1200" height="360" rx="26" fill="url(#grid)"/>
  <path d="M58 78h264l36-38h484l36 38h264v204h-264l-36 38H358l-36-38H58z" fill="url(#panel)" stroke="#254a60" stroke-width="2.5"/>
  <path d="M112 99h214m538 0h224" stroke="#18e5ff" stroke-width="4" filter="url(#glow)"/>
  <path d="M112 261h214l28 29h492l28-29h214" stroke="url(#accent)" stroke-width="4" filter="url(#glow)" fill="none"/>

  <g transform="translate(105 92)">
    <path d="M60 0h142l60 35v142l-60 35H60L0 177V35z" fill="#03110d" stroke="#65ff4d" stroke-width="6" filter="url(#glow)"/>
    <path d="M28 177h174l60-35" fill="none" stroke="#18e5ff" stroke-width="4" opacity="0.78"/>
    <text x="44" y="142" fill="#65ff4d" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="98" font-weight="950" letter-spacing="-7">R</text>
    <text x="132" y="142" fill="#18e5ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="98" font-weight="950" letter-spacing="-7">M</text>
  </g>

  <g transform="translate(410 119)">
    <text x="0" y="0" fill="#edf7ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="54" font-weight="950" letter-spacing="1" textLength="650" lengthAdjust="spacingAndGlyphs">REVERSA-MATRIX</text>
    <text x="3" y="45" fill="#18e5ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" font-weight="900" letter-spacing="4" textLength="545" lengthAdjust="spacingAndGlyphs">EVIDENCE FIRST / PATCHES GUARDED</text>

    <g transform="translate(4 78)" font-family="ui-monospace,Consolas,monospace" font-size="18" font-weight="800">
      <rect x="0" y="0" width="135" height="38" rx="4" fill="#06140d" stroke="#65ff4d"/>
      <rect x="156" y="0" width="174" height="38" rx="4" fill="#06131a" stroke="#18e5ff"/>
      <rect x="352" y="0" width="154" height="38" rx="4" fill="#16070b" stroke="#ff304f"/>
      <text x="22" y="25" fill="#65ff4d">SCAN</text>
      <text x="179" y="25" fill="#18e5ff">FRONTIER</text>
      <text x="374" y="25" fill="#ff304f">GUARDED</text>
    </g>

    <text x="4" y="157" fill="#93a5b8" font-family="ui-monospace,Consolas,monospace" font-size="22" font-weight="700" textLength="392" lengthAdjust="spacingAndGlyphs">JSON / JSONL = SOURCE OF TRUTH</text>
  </g>
</svg>

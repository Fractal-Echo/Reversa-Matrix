<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1000 620">
  <title id="title">Reversa Studio example</title>
  <desc id="desc">Nebula-style Reversa Studio shot showing local GPU, AMD UMA, and PowerDeck proof lanes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020407"/>
      <stop offset=".52" stop-color="#071018"/>
      <stop offset="1" stop-color="#100609"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#123041" stroke-width="1" opacity=".55"/>
    </pattern>
  </defs>
  <rect width="1000" height="620" rx="24" fill="url(#bg)"/>
  <rect width="1000" height="620" rx="24" fill="url(#grid)"/>
  <path d="M66 46h868v528H66z" fill="#071018" stroke="#244459" stroke-width="2.5"/>
  <path d="M96 82h236m336 0h236" stroke="#00e7ff" stroke-width="4" filter="url(#glow)"/>
  <text x="96" y="124" fill="#edf7ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="950" letter-spacing="2">REVERSA STUDIO</text>
  <text x="98" y="154" fill="#00e7ff" font-family="ui-monospace,Consolas,monospace" font-size="17" font-weight="800">planning_only=true model_output=advisory</text>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <path d="M96 198h240l22 22-22 122H96z" fill="#06100c" stroke="#61ff33" stroke-width="1.5"/>
    <text x="124" y="238" fill="#61ff33" font-size="17" font-weight="950" letter-spacing="2">RTX 5090</text>
    <text x="124" y="278" fill="#edf7ff" font-size="25" font-weight="900">CUDA proof lane</text>
    <text x="124" y="314" fill="#96a5b6" font-size="17">tiny tensor op captured</text>

    <path d="M382 198h240l22 22-22 122H382z" fill="#061019" stroke="#00e7ff" stroke-width="1.5"/>
    <text x="410" y="238" fill="#00e7ff" font-size="17" font-weight="950" letter-spacing="2">HX 370 / 890M</text>
    <text x="410" y="278" fill="#edf7ff" font-size="25" font-weight="900">DirectML lane</text>
    <text x="410" y="314" fill="#96a5b6" font-size="17">64 GB UMA mapped</text>

    <path d="M668 198h240l22 22-22 122H668z" fill="#12070b" stroke="#ff304f" stroke-width="1.5"/>
    <text x="696" y="238" fill="#ff304f" font-size="17" font-weight="950" letter-spacing="2">POWERDECK</text>
    <text x="696" y="278" fill="#edf7ff" font-size="25" font-weight="900">TDP guard lane</text>
    <text x="696" y="314" fill="#96a5b6" font-size="17">preview before mutate</text>
  </g>

  <g font-family="ui-monospace,Consolas,monospace" font-size="18" font-weight="800">
    <path d="M96 396h812v98H96z" fill="#04090e" stroke="#244459"/>
    <text x="126" y="432" fill="#61ff33">backend proof present</text>
    <text x="388" y="432" fill="#00e7ff">provenance recorded</text>
    <text x="660" y="432" fill="#ff304f">weights not committed</text>
    <text x="126" y="468" fill="#edf7ff">patch dossier: proposal-only / source authority stays scanner JSON</text>
  </g>

  <path d="M96 536h316l24 18h128l24-18h320" stroke="#61ff33" stroke-width="4" fill="none" filter="url(#glow)"/>
</svg>
